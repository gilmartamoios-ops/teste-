<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProSFF | Simulador Profissional</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body { font-family: 'Montserrat', sans-serif; background-color: #080808; color: white; }
.prosff-card { background: #121212; border: 1px solid #222; }
.gold-text { color: #ffcc00; }
.green-text { color: #00ff88; }
input { outline: none; }
</style>
</head>

<body class="p-4 pb-20">

<div class="max-w-md mx-auto">

<header class="text-center my-8">
<h1 class="text-4xl font-black gold-text">ProSFF</h1>

<p class="text-xs text-gray-500 uppercase mt-2">
Simulador profissional de construção
</p>

<p class="text-[10px] text-gray-600 mt-1 uppercase">
Controle total do operador
</p>
</header>
<div class="prosff-card rounded-3xl p-4 mb-6 border-dashed border-green-500/30">

<div class="grid grid-cols-2 gap-3">

<div>
<label class="text-[10px] text-gray-500 text-center block">VCMC</label>
<input id="consumo" type="text" value="R$ 300,00"
class="text-center bg-black border border-gray-700 rounded-xl p-2 w-full text-green-400 font-bold"
oninput="formatarMoeda(this); simular()">
</div>

<div>
<label class="text-[10px] text-gray-500 text-center block">Base Inicial</label>
<input id="base" type="number" value="0"
class="text-center bg-black border border-gray-700 rounded-xl p-2 w-full text-green-400 font-bold"
oninput="simular()">
</div>

<div>
<label class="text-[10px] text-gray-500 text-center block">Ativação / Etapa</label>
<input id="ativacao" type="number" value="10"
class="text-center bg-black border border-gray-700 rounded-xl p-2 w-full text-green-400 font-bold"
oninput="simular()">
</div>

<div>
<label class="text-[10px] text-gray-500 text-center block">Duplicação %</label>
<input id="duplicacao" type="number" value="30"
class="text-center bg-black border border-gray-700 rounded-xl p-2 w-full text-green-400 font-bold"
oninput="simular()">
</div>

<div>
<label class="text-[10px] text-gray-500 text-center block">Retenção %</label>
<input id="retencao" type="number" value="80"
class="text-center bg-black border border-gray-700 rounded-xl p-2 w-full text-green-400 font-bold"
oninput="simular()">
</div>

</div>

</div>

<div class="flex items-center justify-between mb-4">
<button onclick="voltar()" class="bg-gray-800 px-4 py-2 rounded-xl">←</button>
<p class="font-bold">Etapa <span id="etapa">1</span> de 12</p>
<button onclick="avancar()" class="bg-gray-800 px-4 py-2 rounded-xl">→</button>
</div>

<div id="resultado"></div>

</div>
<script>

function formatarMoeda(campo){
let valor = campo.value.replace(/\D/g,'');
valor = (parseFloat(valor)/100).toFixed(2) + '';
valor = valor.replace(".", ",");
valor = valor.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
campo.value = "R$ " + valor;
}

let etapaAtual = 1;

function avancar(){
if(etapaAtual < 12){
etapaAtual++;
simular();
}
}

function voltar(){
if(etapaAtual > 1){
etapaAtual--;
simular();
}
}

function simular(){

let consumo = document.getElementById('consumo').value
.replace("R$","")
.replace(/\./g,"")
.replace(",",".")
.trim();

consumo = parseFloat(consumo) || 300;

let base = parseFloat(document.getElementById('base').value) || 0;
let ativacao = parseFloat(document.getElementById('ativacao').value) || 10;
let dup = (parseFloat(document.getElementById('duplicacao').value) || 30) / 100;
let ret = (parseFloat(document.getElementById('retencao').value) || 80) / 100;

document.getElementById('etapa').innerText = etapaAtual;

for(let i=1;i<=etapaAtual;i++){

let novos = ativacao;
let replicando = base * dup;

base = (base + novos + replicando) * ret;

}

let consumidores = Math.floor(base);
let faturamento = consumidores * consumo;
let ganho = faturamento * 0.05;

document.getElementById('resultado').innerHTML = `
<div class="prosff-card p-6 rounded-2xl border-l-4 border-l-green-500">

<p class="text-xs text-gray-500 uppercase">Etapa ${etapaAtual}</p>

<h3 class="text-lg font-bold">${consumidores} consumidores</h3>

<p class="text-green-400 text-xs mb-4">Modelo realista</p>

<p class="text-2xl font-black green-text">
R$ ${Math.floor(ganho).toLocaleString('pt-BR')}
</p>

<a href="https://wa.me/5522999231211"
class="bg-green-500 text-black font-bold px-4 py-3 rounded-xl block text-center mt-4">

Falar no WhatsApp

</a>

</div>
`;

}

simular();

</script>

</body>
</html>
